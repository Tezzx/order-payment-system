<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>订单支付</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f5f5;
            padding: 20px;
            font-size: 16px;
        }
        .pay-box {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        .title {
            font-size: 22px;
            margin-bottom: 20px;
            text-align: center;
            color: #333;
        }
        .order-info {
            line-height: 2.2;
            margin-bottom: 30px;
            color: #444;
        }
        .pay-btn {
            width: 100%;
            height: 48px;
            background: #ff4d4f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        .pay-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="pay-box">
        <div class="title">订单支付</div>
        <div class="order-info">
            <p>订单号：<span id="orderNo">-</span></p>
            <p>商品名称：<span id="goodsName">-</span></p>
            <p>单价：<span id="price">-</span> 元</p>
            <p>购买数量：<span id="buyNum">-</span></p>
            <p>实付金额：<span id="totalPrice" style="color:red;font-weight:bold;">-</span> 元</p>
            <p>订单状态：<span id="status">-</span></p>
        </div>
        <button class="pay-btn" id="payBtn" onclick="toPay()">立即支付</button>
    </div>

    <script>
        // 页面加载完成执行
        window.onload = function () {
            // 1. 从地址栏获取 orderNo
            const params = new URLSearchParams(window.location.search);
            const orderNo = params.get("orderNo");

            // 2. 获取本地 token
            const token = localStorage.getItem('userToken');

            if (!orderNo) {
                alert("订单号不存在");
                return;
            }
            if (!token) {
                alert("请先登录");
                location.href = "/auth";
                return;
            }

            // 3. 请求订单详情接口
            fetch(`/payment/ensure?orderNo=${orderNo}`, {
                method: 'POST',
                headers: {
                    "Authorization": "Bearer " + token
                }
            })
                .then(res => res.json())
                .then(data => {
                    if (data.msg !== "success") {
                        alert(data.msg || "获取订单失败");
                        return;
                    }

                    const order = data.data;
                    // 赋值到页面
                    document.getElementById("orderNo").innerText = order.OrderNo;
                    document.getElementById("goodsName").innerText = order.GoodsName;
                    // 如果你存的是分，这里要 /100，直接存元就不用
                    document.getElementById("price").innerText = order.Price;
                    document.getElementById("buyNum").innerText = order.BuyNum;
                    document.getElementById("totalPrice").innerText = order.TotalPrice;

                    // 订单状态文字
                    let statusText = "未支付";
                    if (order.Status === 1) statusText = "已支付";
                    if (order.Status === 2) statusText = "已取消";
                    document.getElementById("status").innerText = statusText;

                    // 如果已支付，禁用按钮
                    if (order.Status !== 0) {
                        document.getElementById("payBtn").disabled = true;
                    }
                })
                .catch(err => {
                    alert("请求异常：" + err.message);
                });
        };

        // 支付按钮点击
        function toPay() {
            const params = new URLSearchParams(window.location.search);
            const orderNo = params.get("orderNo");
            const token = localStorage.getItem('userToken');

            if (!confirm("确认支付该订单？")) return;

            // 请求支付接口
            fetch("/payment/settle", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({ orderNo: orderNo })
            })
                .then(res => res.json())
                .then(data => {
                    alert(data.msg);
                        location.href = "/"; // 支付成功跳订单列表
                })
                .catch(err => alert("支付失败：" + err.message));
        }
    </script>
</body>
</html>
